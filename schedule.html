<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ИСП-24 | расписание</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f5f7fb;
            color: #1e293b;
            line-height: 1.4;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            padding: 0 0.75rem;
            margin: 0 auto;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #64748b;
            --dark: #0f172a;
            --light: #f8fafc;
            --border: #e2e8f0;
            --numerator-bg: #e6f7ff;
            --denominator-bg: #fff1f0;
        }

        .navbar {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(226,232,240,0.6);
            padding: 0.5rem 0;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 600;
            color: #0f172a;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.2rem;
        }

        .logo i { 
            color: #2563eb; 
            font-size: 1rem;
        }

        .logo span {
            background: rgba(37,99,235,0.1);
            padding: 0.1rem 0.3rem;
            border-radius: 30px;
            color: #2563eb;
            font-size: 0.9rem;
        }

        .nav-links {
            display: flex;
            gap: 0.4rem;
            align-items: center;
        }

        .back-home-btn {
            background: #eef2f6;
            color: #1e293b;
            padding: 0.3rem 0.7rem;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.75rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.2rem;
            border: 1px solid rgba(0,0,0,0.02);
            white-space: nowrap;
        }

        .schedule-container {
            background: white;
            border-radius: 24px;
            padding: 1.2rem 0.75rem;
            margin: 1rem 0 1.5rem;
            box-shadow: 0 12px 25px -12px rgba(0,0,0,0.15);
            border: 1px solid var(--border);
        }

        .schedule-header {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.2rem;
        }

        .schedule-header h2 {
            font-size: 1.3rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .schedule-header h2 i {
            color: var(--primary);
            font-size: 1.2rem;
        }

        .week-toggle {
            display: flex;
            gap: 0.5rem;
            background: #f1f5f9;
            padding: 0.25rem;
            border-radius: 40px;
            width: fit-content;
        }

        .week-btn {
            padding: 0.4rem 1rem;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            background: transparent;
            color: var(--secondary);
            transition: all 0.2s;
            white-space: nowrap;
        }

        .week-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 2px 8px rgba(37,99,235,0.3);
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem 1.2rem;
            margin-bottom: 1rem;
            background: #f8fafc;
            padding: 0.8rem;
            border-radius: 16px;
            font-size: 0.75rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .numerator-dot {
            width: 16px;
            height: 16px;
            background: var(--numerator-bg);
            border-radius: 4px;
            border: 2px solid var(--primary);
        }

        .denominator-dot {
            width: 16px;
            height: 16px;
            background: var(--denominator-bg);
            border-radius: 4px;
            border: 2px solid #ff4d4f;
        }

        .constant-dot {
            width: 16px;
            height: 16px;
            background: #f9f9f9;
            border-radius: 4px;
            border: 2px solid #8c8c8c;
        }

        .week-info {
            display: inline-block;
            background: #e6f7ff;
            padding: 0.3rem 0.8rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 1rem;
        }

        .week-info i {
            color: var(--primary);
            margin-right: 0.3rem;
        }
        .mobile-schedule {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .day-card {
            background: #fafcff;
            border-radius: 18px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .day-header {
            background: linear-gradient(135deg, #2563eb10, #1d4ed820);
            padding: 0.8rem 1rem;
            font-weight: 700;
            font-size: 1rem;
            color: var(--primary-dark);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .day-header i {
            font-size: 1rem;
            color: var(--primary);
        }

        .lesson-row {
            display: flex;
            padding: 0.8rem 1rem;
            border-bottom: 1px solid #eef2f6;
            gap: 0.8rem;
        }

        .lesson-row:last-child {
            border-bottom: none;
        }

        .lesson-time {
            min-width: 85px;
            font-weight: 600;
            color: var(--primary);
            font-size: 0.8rem;
            white-space: nowrap;
        }

        .lesson-content {
            flex: 1;
        }

        .lesson-subject {
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.2rem;
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 6px;
        }

        .numerator-badge {
            background-color: var(--numerator-bg);
            border-left: 3px solid var(--primary);
        }

        .denominator-badge {
            background-color: var(--denominator-bg);
            border-left: 3px solid #ff4d4f;
        }

        .constant-badge {
            background-color: #f9f9f9;
            border-left: 3px solid #8c8c8c;
        }

        .lesson-cabinet {
            font-size: 0.7rem;
            color: var(--secondary);
            display: inline-flex;
            align-items: center;
            gap: 0.2rem;
            background: white;
            padding: 0.15rem 0.5rem;
            border-radius: 30px;
            border: 1px solid var(--border);
            margin-top: 0.2rem;
        }

        .empty-lesson {
            color: var(--secondary);
            font-style: italic;
            font-size: 0.8rem;
            opacity: 0.7;
        }
        .desktop-table {
            display: none;
        }
        @media (min-width: 768px) {
            .mobile-schedule {
                display: none;
            }
            .desktop-table {
                display: block;
                overflow-x: auto;
            }
            .schedule-header {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
        }

        .footer {
            text-align: center;
            padding: 1rem 0 1.5rem;
            color: var(--secondary);
            font-size: 0.75rem;
        }
        .table-scroll {
            overflow-x: auto;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: #fafcff;
        }

        .schedule-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
            font-size: 0.85rem;
        }

        .schedule-table th {
            background: #f1f6fc;
            padding: 1rem 0.5rem;
            font-weight: 600;
            color: var(--dark);
            border-bottom: 2px solid var(--primary);
            text-align: center;
        }

        .schedule-table td {
            padding: 1rem 0.5rem;
            border-bottom: 1px solid var(--border);
            border-right: 1px solid var(--border);
            vertical-align: top;
        }

        .time-col {
            font-weight: 600;
            color: var(--primary);
            white-space: nowrap;
            width: 100px;
        }

        .numerator {
            background-color: var(--numerator-bg);
            padding: 0.3rem 0.5rem;
            border-radius: 8px;
            margin: 0.2rem 0;
            border-left: 3px solid var(--primary);
        }

        .denominator {
            background-color: var(--denominator-bg);
            padding: 0.3rem 0.5rem;
            border-radius: 8px;
            margin: 0.2rem 0;
            border-left: 3px solid #ff4d4f;
        }

        .constant {
            background-color: #f9f9f9;
            padding: 0.3rem 0.5rem;
            border-radius: 8px;
            margin: 0.2rem 0;
            border-left: 3px solid #8c8c8c;
        }

        .cabinet {
            font-size: 0.7rem;
            color: var(--secondary);
            margin-top: 0.2rem;
            display: inline-block;
            background: white;
            padding: 0.1rem 0.5rem;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .empty-cell {
            color: var(--secondary);
            font-style: italic;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-code"></i> ИСП<span>.24</span>
            </a>
            <div class="nav-links">
                <a href="index.html" class="back-home-btn">
                    <i class="fas fa-arrow-left"></i> назад
                </a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="schedule-container">
            <div class="schedule-header">
                <h2>
                    <i class="fas fa-calendar-alt"></i> Расписание
                </h2>
                <div class="week-toggle">
                    <button class="week-btn active" id="numeratorBtn">Числитель</button>
                    <button class="week-btn" id="denominatorBtn">Знаменатель</button>
                </div>
            </div>

            <div class="legend">
                <div class="legend-item">
                    <div class="constant-dot"></div>
                    <span>Постоянно</span>
                </div>
                <div class="legend-item">
                    <div class="numerator-dot"></div>
                    <span>Только числитель</span>
                </div>
                <div class="legend-item">
                    <div class="denominator-dot"></div>
                    <span>Только знаменатель</span>
                </div>
            </div>

            <div class="week-info" id="weekInfo">
                <i class="fas fa-info-circle"></i> <span id="currentWeek">Числитель</span>
            </div>
            <div class="mobile-schedule" id="mobileSchedule"></div>
            <div class="desktop-table">
                <div class="table-scroll">
                    <table class="schedule-table" id="scheduleTable">
                        <thead>
                            <tr>
                                <th>Время</th>
                                <th>Пн</th>
                                <th>Вт</th>
                                <th>Ср</th>
                                <th>Чт</th>
                                <th>Пт</th>
                                <th>Сб</th>
                            </tr>
                        </thead>
                        <tbody id="scheduleBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>ИСП-24 · расписание</p>
    </footer>

    <script>
        const scheduleData = {
            monday: [
                { time: "8:30–10:00", type: "constant", subject: "МДК 01.04", cabinet: "501" },
                { time: "10:15–11:00", type: "constant", subject: "Классный час", cabinet: "552" },
                { time: "11:10–12:40", type: "constant", subject: "МДК 01.01", cabinet: "501" },
                { time: "13:10–14:40", type: "numerator", subject: "ОАиП", cabinet: "501" }
            ],
            tuesday: [
                { time: "8:30–10:00", type: "constant", subject: "Числ. методы", cabinet: "540" },
                { time: "10:15–11:45", type: "constant", subject: "ОСиС", cabinet: "529" },
                { time: "12:15–13:45", type: "constant", subject: "Выш. мат.", cabinet: "357" },
                { time: "13:55–15:35", type: "none", subject: "—", cabinet: "" }
            ],
            wednesday: [
                { time: "8:30–10:00", type: "constant", subject: "Английский язык", cabinet: "2 корпус №25/27" },
                { time: "10:15–11:45", type: "constant", subject: "МДК 04.01", cabinet: "563" },
                { time: "12:15–13:45", type: "constant", subject: "МДК 04.02", cabinet: "552" },
                { time: "13:55–15:25", type: "denominator", subject: "МДК 02.02", cabinet: "516" }
            ],
            thursday: [
                { time: "8:30–10:00", type: "constant", subject: "Дис. мат.", cabinet: "357" },
                { time: "10:15–11:45", type: "constant", subject: "Физкультура", cabinet: "" },
                { time: "12:15–13:45", type: "constant", subject: "ОАиП", cabinet: "501" },
                { time: "13:55–15:25", type: "none", subject: "—", cabinet: "" }
            ],
            friday: [
                { time: "8:30–10:00", type: "constant", subject: "МДК 04.01", cabinet: "563" },
                { time: "10:15–11:45", type: "constant", subject: "Дис. мат.", cabinet: "357" },
                { time: "12:15–13:45", type: "alternating", subjectNumerator: "МДК 01.04", subjectDenominator: "МДК 01.01", cabinet: "501" }
            ],
            saturday: [
                { time: "8:30–10:00", type: "constant", subject: "МДК 07.01", cabinet: "516" },
                { time: "10:15–11:45", type: "constant", subject: "МДК 07.01", cabinet: "516" },
                { time: "12:00–13:30", type: "constant", subject: "МДК 02.02", cabinet: "516" }
            ]
        };

        let currentWeek = 'numerator';

        function renderMobileSchedule() {
            const container = document.getElementById('mobileSchedule');
            container.innerHTML = '';

            const days = [
                { name: 'Понедельник', icon: 'fa-sun', data: scheduleData.monday },
                { name: 'Вторник', icon: 'fa-cloud', data: scheduleData.tuesday },
                { name: 'Среда', icon: 'fa-cloud-rain', data: scheduleData.wednesday },
                { name: 'Четверг', icon: 'fa-wind', data: scheduleData.thursday },
                { name: 'Пятница', icon: 'fa-umbrella', data: scheduleData.friday },
                { name: 'Суббота', icon: 'fa-crown', data: scheduleData.saturday }
            ];

            days.forEach(day => {
                const card = document.createElement('div');
                card.className = 'day-card';

                const header = document.createElement('div');
                header.className = 'day-header';
                header.innerHTML = `<i class="fas ${day.icon}"></i> ${day.name}`;
                card.appendChild(header);

                let hasLessons = false;
                day.data.forEach(lesson => {
                    const lessonRow = document.createElement('div');
                    lessonRow.className = 'lesson-row';

                    const timeDiv = document.createElement('div');
                    timeDiv.className = 'lesson-time';
                    timeDiv.textContent = lesson.time;
                    lessonRow.appendChild(timeDiv);

                    const contentDiv = document.createElement('div');
                    contentDiv.className = 'lesson-content';

                    if (lesson.type === 'none') {
                        contentDiv.innerHTML = '<span class="empty-lesson">—</span>';
                        lessonRow.appendChild(contentDiv);
                        card.appendChild(lessonRow);
                        return;
                    }

                    if (lesson.type === 'alternating') {
                        const subjectDiv = document.createElement('div');
                        subjectDiv.className = `lesson-subject ${currentWeek === 'numerator' ? 'numerator-badge' : 'denominator-badge'}`;
                        subjectDiv.textContent = currentWeek === 'numerator' ? lesson.subjectNumerator : lesson.subjectDenominator;
                        contentDiv.appendChild(subjectDiv);
                        hasLessons = true;
                    } else if (lesson.type === 'constant') {
                        const subjectDiv = document.createElement('div');
                        subjectDiv.className = 'lesson-subject constant-badge';
                        subjectDiv.textContent = lesson.subject;
                        contentDiv.appendChild(subjectDiv);
                        hasLessons = true;
                    } else if (lesson.type === currentWeek) {
                        const subjectDiv = document.createElement('div');
                        subjectDiv.className = `lesson-subject ${lesson.type}-badge`;
                        subjectDiv.textContent = lesson.subject;
                        contentDiv.appendChild(subjectDiv);
                        hasLessons = true;
                    } else {
                        contentDiv.innerHTML = '<span class="empty-lesson">—</span>';
                    }

                    if (lesson.cabinet && lesson.cabinet !== '' && lesson.type !== 'none' && 
                        (lesson.type === 'constant' || lesson.type === currentWeek || lesson.type === 'alternating')) {
                        const cabinetSpan = document.createElement('div');
                        cabinetSpan.className = 'lesson-cabinet';
                        cabinetSpan.innerHTML = `<i class="fas fa-door-open"></i> ${lesson.cabinet}`;
                        contentDiv.appendChild(cabinetSpan);
                    }

                    lessonRow.appendChild(contentDiv);
                    card.appendChild(lessonRow);
                });

                if (!hasLessons) {
                    const emptyRow = document.createElement('div');
                    emptyRow.className = 'lesson-row';
                    emptyRow.innerHTML = '<div class="lesson-time"></div><div class="lesson-content"><span class="empty-lesson">Нет пар</span></div>';
                    card.appendChild(emptyRow);
                }

                container.appendChild(card);
            });
        }

        function renderDesktopSchedule() {
            const tbody = document.getElementById('scheduleBody');
            tbody.innerHTML = '';

            const maxRows = 4;

            for (let row = 0; row < maxRows; row++) {
                const tr = document.createElement('tr');
                
                const timeTd = document.createElement('td');
                timeTd.className = 'time-col';
                timeTd.textContent = scheduleData.monday[row]?.time || '';
                tr.appendChild(timeTd);

                ['monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'].forEach(day => {
                    const td = document.createElement('td');
                    if (scheduleData[day][row]) {
                        td.appendChild(createDesktopCell(scheduleData[day][row]));
                    } else {
                        td.innerHTML = '<span class="empty-cell">—</span>';
                    }
                    tr.appendChild(td);
                });

                tbody.appendChild(tr);
            }
        }

        function createDesktopCell(data) {
            const div = document.createElement('div');

            if (data.type === 'none') {
                div.innerHTML = '<span class="empty-cell">—</span>';
                return div;
            }

            if (data.type === 'alternating') {
                const subjectDiv = document.createElement('div');
                subjectDiv.className = currentWeek === 'numerator' ? 'numerator' : 'denominator';
                subjectDiv.textContent = currentWeek === 'numerator' ? data.subjectNumerator : data.subjectDenominator;
                div.appendChild(subjectDiv);
                
                if (data.cabinet) {
                    const cabinetSpan = document.createElement('span');
                    cabinetSpan.className = 'cabinet';
                    cabinetSpan.innerHTML = `<i class="fas fa-door-open"></i> ${data.cabinet}`;
                    div.appendChild(cabinetSpan);
                }
            } else if (data.type === 'constant') {
                const subjectDiv = document.createElement('div');
                subjectDiv.className = 'constant';
                subjectDiv.textContent = data.subject;
                div.appendChild(subjectDiv);
                
                if (data.cabinet) {
                    const cabinetSpan = document.createElement('span');
                    cabinetSpan.className = 'cabinet';
                    cabinetSpan.innerHTML = `<i class="fas fa-door-open"></i> ${data.cabinet}`;
                    div.appendChild(cabinetSpan);
                }
            } else if (data.type === currentWeek) {
                const subjectDiv = document.createElement('div');
                subjectDiv.className = data.type;
                subjectDiv.textContent = data.subject;
                div.appendChild(subjectDiv);
                
                if (data.cabinet) {
                    const cabinetSpan = document.createElement('span');
                    cabinetSpan.className = 'cabinet';
                    cabinetSpan.innerHTML = `<i class="fas fa-door-open"></i> ${data.cabinet}`;
                    div.appendChild(cabinetSpan);
                }
            } else {
                div.innerHTML = '<span class="empty-cell">—</span>';
            }

            return div;
        }

        function updateDisplay() {
            document.getElementById('currentWeek').textContent = 
                currentWeek === 'numerator' ? 'Числитель' : 'Знаменатель';
            
            renderMobileSchedule();
            renderDesktopSchedule();
        }

        document.getElementById('numeratorBtn').addEventListener('click', function() {
            this.classList.add('active');
            document.getElementById('denominatorBtn').classList.remove('active');
            currentWeek = 'numerator';
            updateDisplay();
        });

        document.getElementById('denominatorBtn').addEventListener('click', function() {
            this.classList.add('active');
            document.getElementById('numeratorBtn').classList.remove('active');
            currentWeek = 'denominator';
            updateDisplay();
        });

        updateDisplay();
    </script>
</body>
</html>
